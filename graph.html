<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzhou Event Dashboard - Knowledge Graph</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/neovis.js@2.1.0"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="graph">
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i data-lucide="map-pinned"></i>
        </div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html">Data</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
  </nav>

  <main class="container">
    <section class="card graph-card">
      <div class="section-head">
        <h3>Knowledge Graph</h3>
        <p>Interactive graph view of events, venues, and nearby hotels.</p>
      </div>

      <div id="viz" style="width: 100%; height: 75vh; min-height: 650px; border-radius: 8px; background: #ffffff;"></div>
    </section>
  </main>

<script>
  const config = {
    containerId: "viz",

    neo4j: {
      serverUrl: "neo4j+s://3887ee5d.databases.neo4j.io",
      serverUser: "neo4j",
      serverPassword: "jdcAuigpoLEbPZNK1Jp0icMGhhm7ZYEdLQbsMz0ZIbc",
      database: "neo4j"
    },

    labels: {
      Event: {
        label: "title",
        color: "#2E7D32"
      },
      venue: {
        label: "name",
        color: "#66BB6A"
      },
      sector: {
        label: "name",
        color: "#A5D6A7"
      },
      organizer: {
        label: "name",
        color: "#81C784"
      },
      scope: {
        label: "name",
        color: "#C8E6C9"
      }
    },

    relationships: {
      HELD_AT: { color: "#9CA3AF" },
      BELONGS_TO: { color: "#9CA3AF" },
      ORGANIZED_BY: { color: "#9CA3AF" },
      TARGETS: { color: "#9CA3AF" }
    },

    initialCypher: `
      MATCH p=()-[r]->()
      RETURN p
      LIMIT 80
    `
  };

  const viz = new NeoVis.default(config);
  viz.render();
</script>
</body>
</html>
