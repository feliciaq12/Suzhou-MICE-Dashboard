<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph</title>

  <link rel="stylesheet" href="style.css" />

  <!-- NeoVis -->
  <script src="https://unpkg.com/neovis.js@2.0.2"></script>
</head>

<body data-page="graph">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          📍
        </div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html">Data</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
  </nav>

  <!-- MAIN -->
  <main class="container">

    <section class="card">
      <h2>Event Relationship Graph</h2>
      <p style="margin-bottom: 12px; color:#64748b;">
        Visualizing connections between events, venues, and nearby hotels.
      </p>

      <!-- GRAPH -->
      <div id="viz" style="height: 600px;"></div>
    </section>

  </main>

  <!-- NEO VIS SCRIPT -->
  <script>
    const config = {
      containerId: "viz",

      neo4j: {
        serverUrl: "neo4j+s://3887ee5d.databases.neo4j.io",
        serverUser: "neo4j",
        serverPassword: "jdcAuigpoLEbPZNK1Jp0icMGhhm7ZYEdLQbsMz0ZIbc"
      },

      labels: {
        Event: {
          label: "title",
          value: "size",
          group: "Event"
        },
        Venue: {
          label: "venue",
          group: "Venue"
        },
        Hotel: {
          label: "name",
          group: "Hotel"
        }
      },

      relationships: {
        HELD_AT: {
          thickness: "1",
          caption: false
        },
        NEAR: {
          thickness: "1",
          caption: false
        }
      },

      initialCypher: `
        MATCH (e)-[r]->(n)
        RETURN e, r, n
        LIMIT 80
      `
    };

    const viz = new NeoVis.default(config);
    viz.render();
  </script>

</body>
</html>
