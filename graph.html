<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzhou Event Dashboard - Knowledge Graph</title>

  <link rel="stylesheet" href="style.css" />

  <!-- vis-network -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body data-page="graph">

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">📍</div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html">Data</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
  </nav>

  <main class="container">
    <section class="card graph-card">
      <h3>Knowledge Graph</h3>
      <p style="color:#64748b;">
        Interactive relationships between events, venues, sectors, organizers, and scope.
      </p>

      <div id="network" style="height:650px;"></div>
    </section>
  </main>

  <script>
    async function loadGraph() {
      const res = await fetch("data.json");
      const data = await res.json();

      const nodes = [];
      const edges = [];

      const nodeSet = new Set();

      function addNode(id, label, color) {
        if (!nodeSet.has(id)) {
          nodes.push({ id, label, color });
          nodeSet.add(id);
        }
      }

      data.forEach((d, i) => {
        const eventId = "event_" + i;
        addNode(eventId, d.title, "#2E7D32");

        if (d.venue) {
          const venueId = "venue_" + d.venue;
          addNode(venueId, d.venue, "#66BB6A");
          edges.push({ from: eventId, to: venueId });
        }

        if (d.sector) {
          const sectorId = "sector_" + d.sector;
          addNode(sectorId, d.sector, "#A5D6A7");
          edges.push({ from: eventId, to: sectorId });
        }

        if (d.organizer) {
          const orgId = "org_" + d.organizer;
          addNode(orgId, d.organizer, "#81C784");
          edges.push({ from: eventId, to: orgId });
        }

        if (d.scope) {
          const scopeId = "scope_" + d.scope;
          addNode(scopeId, d.scope, "#C8E6C9");
          edges.push({ from: eventId, to: scopeId });
        }
      });

      const container = document.getElementById("network");

      const networkData = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
      };

      const options = {
        nodes: {
          shape: "dot",
          size: 16,
          font: {
            size: 14
          }
        },
        edges: {
          color: "#94a3b8",
          smooth: true
        },
        physics: {
          stabilization: true
        }
      };

      new vis.Network(container, networkData, options);
    }

    loadGraph();
  </script>

</body>
</html>
