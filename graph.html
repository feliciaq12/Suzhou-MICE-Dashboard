<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzhou Event Dashboard - Knowledge Graph</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/neovis.js@2.1.0"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="graph">
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i data-lucide="map-pinned"></i>
        </div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html">Data</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
  </nav>

  <main class="container">
    <section class="card graph-card">
      <div class="section-head">
        <h3>Knowledge Graph</h3>
        <p>Interactive graph view of events, venues, and nearby hotels.</p>
      </div>

      <div id="viz" style="width: 100%; height: 75vh; min-height: 650px; border-radius: 8px; background: #ffffff;"></div>
    </section>
  </main>

  <script>
    lucide.createIcons();

    const config = {
      containerId: "viz",
      neo4j: {
        serverUrl: "neo4j+s://3887ee5d.databases.neo4j.io",
        serverUser: "neo4j",
        serverPassword: "jdcAuigpoLEbPZNK1Jp0icMGhhm7ZYEdLQbsMz0ZIbc",
        database: "neo4j"
      },

      labels: {
        Event: {
          label: "title",
          color: "#2E7D32"
        },
        Venue: {
          label: "name",
          color: "#66BB6A"
        },
        Hotel: {
          label: "name",
          color: "#A5D6A7"
        }
      },

      relationships: {
        HELD_AT: {
          color: "#9CA3AF",
          thickness: 1
        },
        NEAR: {
          color: "#CBD5E1",
          thickness: 1
        }
      },

      visConfig: {
        nodes: {
          shape: "dot",
          font: {
            size: 16,
            face: "Inter"
          }
        },
        edges: {
          smooth: true,
          arrows: {
            to: false
          }
        },
        physics: {
          stabilization: true
        }
      },

      initialCypher: `
        MATCH p=()-[r]->()
        RETURN p
        LIMIT 60
      `
    };

    const viz = new NeoVis.default(config);
    viz.render();
  </script>
</body>
</html>
