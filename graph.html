<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzhou Event Dashboard - Knowledge Graph</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/neovis.js@2.0.2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="graph" onload="draw()">
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i data-lucide="map-pinned"></i>
        </div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html">Data</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
  </nav>

  <main class="container">
    <section class="card graph-card">
      <div class="section-head">
        <h3>Knowledge Graph</h3>
        <p>Interactive relationships between events, venues, sectors, organizers, and scope.</p>
      </div>
      <div id="viz" style="width:100%; height:75vh; min-height:650px; background:#fff; border-radius:8px;"></div>
    </section>
  </main>

  <script>
    lucide.createIcons();

    let neoViz;

    function draw() {
      const config = {
        containerId: "viz",
        neo4j: {
          serverUrl: "neo4j+s://3887ee5d.databases.neo4j.io",
          serverUser: "neo4j",
          serverPassword: "jdcAuigpoLEbPZNK1Jp0icMGhhm7ZYEdLQbsMz0ZIbc"
        },
        labels: {
          Event: {
            label: "title"
          },
          venue: {
            label: "name"
          },
          sector: {
            label: "name"
          },
          organizer: {
            label: "name"
          },
          scope: {
            label: "name"
          }
        },
        relationships: {
          HELD_AT: {},
          BELONGS_TO: {},
          ORGANIZED_BY: {},
          TARGETS: {}
        },
        initialCypher: `
          MATCH (e:Event)-[r]->(n)
          RETURN *
          LIMIT 80
        `
      };

      neoViz = new NeoVis.default(config);
      neoViz.render();
    }
  </script>
</body>
</html>
