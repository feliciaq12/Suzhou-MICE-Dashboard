<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suzhou MICE Dashboard</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>Suzhou Event Dashboard</h1>
  <p>苏州活动数据分析平台</p>
</header>

<div class="container">

  <!-- STATS -->
  <section class="stats">
    <div class="card">
      <h2 id="totalEvents">-</h2>
      <p>Total Events</p>
    </div>

    <div class="card">
      <h2 id="thisMonth">-</h2>
      <p>This Month</p>
    </div>

    <div class="card">
      <h2 id="upcoming">-</h2>
      <p>Upcoming</p>
    </div>

    <div class="card">
      <h2 id="sectors">-</h2>
      <p>Sectors</p>
    </div>
  </section>

  <!-- CHARTS -->
  <section class="charts">

    <div class="chart-card">
      <h3>Events by Sector</h3>
      <div style="height:300px;">
      <canvas id="sectorChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Events by Type</h3>
      <div style="height:300px;">
      <canvas id="typeChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Top Venues</h3>
      <div style="height:300px;">
      <canvas id="venueChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Visitor Impact by Sector</h3>
      <div style="height:300px;">
      <canvas id="visitorChart"></canvas>
    </div>

  </section>

  <!-- TABLE -->
  <section class="card" style="margin-top:20px;">
    <h3>Top Events by Visitor Impact</h3>

    <input type="text" id="searchInput" placeholder="Search events..."/>

    <table>
      <thead>
        <tr>
          <th>Event Name</th>
          <th>Venue</th>
          <th>Sector</th>
          <th>Scope</th>
          <th>Impact</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
